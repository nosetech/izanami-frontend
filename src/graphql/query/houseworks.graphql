query listHouseWorks(
  $familyId: ID!
  $sort: HouseworkSortInput
  $filter: HouseworkFilterInput
  $after: String
) {
  houseworks(familyId: $familyId, sort: $sort, filter: $filter, after: $after) {
    edges {
      cursor
      node {
        id
        title
        description
        category
        schedule
        suggestedBy {
          id
          name
        }
        point
        committed
        createdAt
        updatedAt
      }
    }
    pageInfo {
      startCursor
      endCursor
      hasNextPage
      hasPreviousPage
    }
    totalCount
  }
}
